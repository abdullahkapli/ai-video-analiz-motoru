<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Özetleyici</title>
    <style>
        /* Ana Arka Plan ve Yazı Tipi */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #070B19; /* Çok Koyu Lacivert */
            color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, #1a2a42, #070B19);
        }

        /* Ana Kutu (Kaporta) */
        .container {
            background-color: #111827; /* Koyu Gri/Lacivert */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 650px;
            border-top: 5px solid #FBBF24; /* Canlı Sarı Üst Çizgi */
        }

        h2 {
            color: #FBBF24; /* Sarı Başlık */
            margin-top: 0;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* 1. Satır: Link ve Buton */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        /* 2. Satır: Ayarlar (Menü ve Checkbox) */
        .settings-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px 15px;
            background-color: #1F2937;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        /* Link Girme Alanı */
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            background-color: #1F2937;
            border: 1px solid #374151;
            border-radius: 8px;
            font-size: 15px;
            color: #F3F4F6;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #FBBF24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        input[type="text"]::placeholder {
            color: #6B7280;
        }

        /* Açılır Menü (Select) Tasarımı */
        select {
            background-color: #111827;
            color: #E2E8F0;
            border: 1px solid #374151;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #FBBF24;
        }

        /* Checkbox Tasarımı */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #D1D5DB;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input[type="checkbox"] {
            accent-color: #FBBF24;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-container:hover {
            color: #FBBF24;
        }

        /* Aksiyon Butonu */
        button {
            background-color: #FBBF24; /* Canlı Sarı */
            color: #111827; /* Lacivert Yazı */
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: #F59E0B;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #4B5563;
            color: #9CA3AF;
            cursor: not-allowed;
            transform: none;
        }

        /* Kod Editörü / Terminal Tarzı Sonuç Kutusu */
        #sonucKutusu {
            margin-top: 25px;
            padding: 25px;
            background-color: #0D1117; /* Siyahımsı Terminal Rengi */
            border: 1px solid #374151;
            border-left: 4px solid #FBBF24;
            border-radius: 8px;
            white-space: pre-wrap; 
            display: none;
            line-height: 1.7;
            color: #A7F3D0; /* Kod yeşili/turkuazı metin rengi */
            font-family: 'Consolas', 'Courier New', monospace; /* Terminal Fontu */
            font-size: 15px;
            overflow-x: auto;
        }

        /* Yükleniyor Animasyonu */
        .loading {
            text-align: center;
            color: #9CA3AF;
            font-style: italic;
            display: none;
            padding: 20px 0;
            font-family: 'Consolas', 'Courier New', monospace;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ AI VİDEO ANALİZ MOTORU</h2>
    
    <div class="input-group">
        <input type="text" id="linkInput" placeholder="> YouTube linkini buraya yapıştırın...">
        <button id="ozetleBtn" onclick="ozetCikar()">BAŞLAT</button> 
    </div>

    <div class="settings-group">
        <select id="modlar">
           <option value="tldr">Kısa ve Öz</option>
           <option value="adim_adim">Adım Adım Rehber</option>
           <option value="soru_cevap">Soru - Cevap</option>
           <option value="arti_eksi">Artılar ve Eksiler</option>
           <option value="flood">Sosyal Medya Flood'u</option>
        </select>
        
        <label class="checkbox-container">
            <input type="checkbox" id="ceviriKutusu">
            <span>Video dilinden bağımsız Türkçe sonuç ver</span>
        </label>
    </div>
    
    <div id="yukleniyor" class="loading">> Model eğitiliyor, metin işleniyor... [||||||||||  ] ⏳</div>
    <div id="sonucKutusu"></div>
    <button id="not-indir" onclick="notlariIndir()" style="display: none; margin-top: 15px; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #111827; background-color: #FBBF24;">📥 Notları İndir (.txt)</button>
</div>

<script>
    async function ozetCikar() {
        const link = document.getElementById('linkInput').value;
        const sonucKutusu = document.getElementById('sonucKutusu');
        const yukleniyor = document.getElementById('yukleniyor');
        const buton = document.getElementById('ozetleBtn');
        const modlar = document.getElementById('modlar').value;
        const ceviriKutusu = document.getElementById('ceviriKutusu').checked;

        if (!link) {
            alert("Lütfen bir link girin!");
            return;
        }

        buton.disabled = true;
        sonucKutusu.style.display = 'none';
        document.getElementById('not-indir').style.display = 'none';
        yukleniyor.style.display = 'block';

        try {
            const response = await fetch("https://ai-video-analiz-motoru.onrender.com//api/ozetle", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ videoLink: link, mod: modlar, ceviri: ceviriKutusu }) 
            });

            const data = await response.json();

            if (data.basari === true) {
                sonucKutusu.innerText = data.veri;
                document.getElementById('not-indir').style.display = 'block';
            } else {
                sonucKutusu.style.color = "#FCA5A5"; 
                sonucKutusu.style.borderLeftColor = "#EF4444";
                sonucKutusu.innerHTML = "> SİSTEM UYARISI: " + data.mesaj;
            }
        } catch (hata) {
            sonucKutusu.style.color = "#FCA5A5";
            sonucKutusu.style.borderLeftColor = "#EF4444";
            sonucKutusu.innerHTML = "> BAĞLANTI HATASI: Sunucuya ulaşılamıyor.";
        } finally {
            yukleniyor.style.display = 'none';
            sonucKutusu.style.display = 'block';
            buton.disabled = false;
        }
    }

    function notlariIndir() {
        const sonucKutusu = document.getElementById('sonucKutusu');
        const sonuc = sonucKutusu.innerText;
        
        const dosya = new Blob([sonuc], { type:'text/plain' });

        const link = document.createElement("a");
        link.href = URL.createObjectURL(dosya); 
        link.download = "Yapay_Zeka_Ozeti.txt";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
